name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION" >&2
            exit 1
          fi

      - name: Skip if this version is already on npm
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "nnet-svg@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "nnet-svg@$VERSION is already published; skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # Trusted publishing needs a recent npm CLI (>= 11.5.1).
      - name: Update npm
        if: steps.check.outputs.published == 'false'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish
